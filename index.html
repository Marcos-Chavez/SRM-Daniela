<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRM Daniela - Panel de Control</title>

    <!-- LIBRERÍAS DE FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <!-- EMAILJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        body {
            background-color: #f3f4f6;
            color: #1f2937;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 0 15px rgba(30, 112, 224, 0.1);
            max-width: 650px;
            margin: 0 auto 30px auto;
            padding: 25px;
        }

        h1, h2, h3 {
            text-align: center;
            color: #111827;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        #login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }

        #login-container input {
            margin-bottom: 15px;
        }

        #btn-logout {
            width: auto;
            float: right;
            background-color: #dc2626;
            padding: 8px 16px;
            font-size: 14px;
        }

        #btn-logout:hover {
            background-color: #b91c1c;
        }

        /* ESTILOS DEL MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN -->
    <div id="login-container">
        <h2 style="margin-bottom: 20px; color: #1f2937;">Acceso al Sistema</h2>
        <input type="email" id="login-email" placeholder="Correo electrónico" required>
        <input type="password" id="login-password" placeholder="Contraseña" required>
        <button id="btn-login" type="button">Iniciar Sesión</button>
        <p id="login-error" style="color: #dc2626; display: none; margin-top: 15px; font-size: 14px; font-weight: bold;"></p>
    </div>

    <!-- SISTEMA PRINCIPAL -->
    <div id="app-container" style="display: none;">
        <div class="container">
            <button id="btn-logout" type="button">Cerrar Sesión</button>
            <div style="clear: both;"></div>

            <h1>👨‍🔧 Sistema de Registro de Mantenimiento - SRM DANIELA</h1>

            <!-- FORMULARIO REGISTRO -->
            <div class="card">
                <div style="text-align: center; margin-bottom: 20px;">
                    <img src="logo-taller.png" alt="Logo del Taller" style="max-width: 180px; height: auto;">
                </div>

                <h2>Registro de Trabajo Automotriz</h2>
                
                <form id="registroForm">
                    <div class="form-group">
                        <label for="placa">Placa del Vehículo (Identificador Único):</label>
                        <input type="text" id="placa" placeholder="Ej. PE1234" required style="text-transform: uppercase;">
                    </div>

                    <div class="form-group">
                        <label for="cliente">Nombre del Cliente:</label>
                        <input type="text" id="cliente" placeholder="Ej. Juan Pérez" required>
                    </div>

                    <div class="form-group">
                        <label for="correo">Correo Electrónico del Cliente:</label>
                        <input type="email" id="correo" placeholder="cliente@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono / WhatsApp:</label>
                        <input type="tel" id="telefono" placeholder="Ej. 6000-0000" required>
                    </div>

                    <div class="form-group">
                        <label for="vehiculo">Vehículo (Marca / Modelo / Año):</label>
                        <input type="text" id="vehiculo" placeholder="Ej. Toyota Corolla 2018" required>
                    </div>

                    <div class="form-group">
                        <label for="servicio">Servicio Realizado / Diagnóstico:</label>
                        <textarea id="servicio" rows="3" placeholder="Ej. Cambio de aceite, revisión de frenos..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="estado">Estado del Trabajo:</label>
                        <select id="estado" required>
                            <option value="En Proceso">En Proceso</option>
                            <option value="Listo para Entrega">Listo para Entrega</option>
                            <option value="Entregado">Entregado</option>
                        </select>
                    </div>

                    <button type="submit" id="btn-guardar">Guardar y Notificar al Cliente</button>
                </form>
            </div>

            <!-- BÚSQUEDA POR PLACA -->
            <div class="card">
                <h2>Buscar Historial por Placa</h2>
                <div class="form-group">
                    <input type="text" id="buscarPlaca" placeholder="Ingrese placa..." style="text-transform: uppercase;">
                </div>
                <button type="button" id="btnBuscarPlaca">Buscar Registros</button>

                <div id="resultadoBusqueda" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <!-- MODAL PARA ACTUALIZAR ESTADO -->
    <div id="modalActualizar" class="modal">
        <div class="modal-content">
            <h3>Actualizar Estado del Vehículo</h3>
            <div class="form-group" style="margin-top: 15px;">
                <label for="nuevoEstadoModal">Nuevo Estado:</label>
                <select id="nuevoEstadoModal">
                    <option value="En Proceso">En Proceso</option>
                    <option value="Listo para Entrega">Listo para Entrega</option>
                    <option value="Entregado">Entregado</option>
                </select>
            </div>
            <button type="button" id="btnGuardarEstadoModal" style="margin-bottom: 10px;">Guardar y Notificar</button>
            <button type="button" onclick="cerrarModal()" style="background-color: #6b7280;">Cancelar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
